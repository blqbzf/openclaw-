name: Build WoW Launcher (Windows Only)

on:
  push:
    branches: [main]
    paths:
      - 'wow_launcher.py'
      - 'launcher_config.json'
      - '.github/workflows/build-launcher.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow requests

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name NolanWoWLauncher wow_launcher.py

    - name: Package release files
      run: |
        mkdir release_package
        copy dist\NolanWoWLauncher.exe release_package\
        copy launcher_config.json release_package\
        copy CreateCert.bat release_package\
        copy InstallCert.bat release_package\
        cd release_package
        7z a -tzip ..\NolanWoWLauncher-Windows.zip *
      shell: cmd

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NolanWoWLauncher-Windows
        path: NolanWoWLauncher-Windows.zip
