name: Build WoW Launcher

on:
  push:
    branches: [ main ]
    tags:
      - v*
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow
    
    - name: Build Windows EXE
      run: |
        pyinstaller --clean --noconfirm --onefile --windowed --name "P1时光WoW登录器" --add-data "launcher_config.json;." wow_launcher.py
    
    - name: Create distribution package
      run: |
        mkdir dist/发布包
        copy dist/P1时光WoW登录器.exe dist/发布包/
        copy launcher_config.json dist/发布包/
        copy 使用说明.txt dist/发布包/ 2>nul || echo 创建使用说明
        copy README.md dist/发布包/
        
        # 创建使用说明
        echo P1时光WoW登录器 使用说明 > dist/发布包/使用说明.txt
        echo ================================ >> dist/发布包/使用说明.txt
        echo. >> dist/发布包/使用说明.txt
        echo 1. 首次运行：设置WoW 3.3.5a客户端路径 >> dist/发布包/使用说明.txt
        echo 2. 注册账号：点击"注册账号"按钮 >> dist/发布包/使用说明.txt
        echo 3. 启动游戏：点击"启动游戏" >> dist/发布包/使用说明.txt
        echo. >> dist/发布包/使用说明.txt
        echo 服务器IP: 1.14.59.54 >> dist/发布包/使用说明.txt
        echo 端口: 3724 (登录), 8085 (游戏) >> dist/发布包/使用说明.txt
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-launcher
        path: dist/发布包/
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/发布包/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow
    
    - name: Build Mac APP
      run: |
        pyinstaller --clean --noconfirm --windowed --name "P1时光WoW登录器" --add-data "launcher_config.json:." wow_launcher.py
    
    - name: Create distribution package
      run: |
        mkdir -p dist/发布包
        cp -r "dist/P1时光WoW登录器.app" dist/发布包/
        cp launcher_config.json dist/发布包/
        cp README.md dist/发布包/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-launcher
        path: dist/发布包/
