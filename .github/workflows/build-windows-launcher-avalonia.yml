name: Build Windows Launcher (Avalonia)

on:
  push:
    branches: [ main, feat/wow-launcher ]
    paths:
      - 'NolanWoWLauncher/**'
      - '.github/workflows/build-windows-launcher-avalonia.yml'
      - '.github/workflows/release-nolan-launcher.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd NolanWoWLauncher
          dotnet restore

      - name: Build and Publish (win-x64 self-contained single-file)
        run: |
          cd NolanWoWLauncher
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NolanWoWLauncher-Windows-x64
          path: NolanWoWLauncher/bin/Release/net8.0-windows/win-x64/publish/NolanWoWLauncher.exe
          retention-days: 30
          if-no-files-found: error

      - name: Rename exe
        shell: pwsh
        run: Rename-Item 'NolanWoWLauncher/bin/Release/net8.0-windows/win-x64/publish/NolanWoWLauncher.exe' '诺兰时光登录器v1.7.exe'

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.7
          name: "诺兰时光魔兽登录器 V1.7"
          body: |
            ## 诺兰时光魔兽世界登录器 V1.7
            ### 更新
            - 修复双补丁需要点两次检查更新的问题
            - 先统一筛出待更新补丁，再连续顺序下载
            - 下载完成后立即二次校验，避免第一包后流程中断
            - 保留正式服 / 测试服双分区与分频道拉取
          files: |
            NolanWoWLauncher/bin/Release/net8.0-windows/win-x64/publish/诺兰时光登录器v1.7.exe
          overwrite_files: true
