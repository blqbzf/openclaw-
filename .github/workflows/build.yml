name: Build WoW Launcher

on:
  push:
    branches: [ main ]
    tags:
      - v*
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow
    
    - name: Build Windows EXE
      run: |
        pyinstaller --clean --noconfirm --onefile --windowed --name "P1WoWLauncher" --add-data "launcher_config.json;." wow_launcher.py
    
    - name: Create distribution package
      shell: bash
      run: |
        mkdir -p dist/release
        cp dist/P1WoWLauncher.exe dist/release/ 2>/dev/null || cp dist/*.exe dist/release/
        cp launcher_config.json dist/release/
        cp README.md dist/release/ 2>/dev/null || true
        
        # Create README
        echo "P1时光WoW登录器 使用说明" > dist/release/README.txt
        echo "================================" >> dist/release/README.txt
        echo "" >> dist/release/README.txt
        echo "1. 首次运行：设置WoW 3.3.5a客户端路径" >> dist/release/README.txt
        echo "2. 注册账号：点击注册账号按钮" >> dist/release/README.txt
        echo "3. 启动游戏：点击启动游戏" >> dist/release/README.txt
        echo "" >> dist/release/README.txt
        echo "服务器IP: 1.14.59.54" >> dist/release/README.txt
        echo "端口: 3724 (登录), 8085 (游戏)" >> dist/release/README.txt
        echo "注册: http://1.14.59.54:5000" >> dist/release/README.txt
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-launcher
        path: dist/release/
        retention-days: 30

  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow
    
    - name: Build Mac APP
      run: |
        pyinstaller --clean --noconfirm --windowed --name "P1时光WoW登录器" --add-data "launcher_config.json:." wow_launcher.py
    
    - name: Create distribution package
      run: |
        mkdir -p dist/release
        cp -r "dist/P1时光WoW登录器.app" dist/release/
        cp launcher_config.json dist/release/
        cp README.md dist/release/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-launcher
        path: dist/release/
        retention-days: 30
