name: Build and Release Nolan Launcher

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd NolanWoWLauncher
          dotnet restore

      - name: Build and Publish (win-x64 self-contained single-file)
        run: |
          cd NolanWoWLauncher
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NolanWoWLauncher-Windows-x64
          path: NolanWoWLauncher/bin/Release/net8.0-windows/win-x64/publish/NolanWoWLauncher.exe
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: NolanWoWLauncher-Windows-x64
          path: ./artifact

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: 诺兰时光魔兽启动器 ${{ github.ref_name }}
          body: |
            ## 诺兰时光魔兽启动器
            
            ### 功能特性
            - ✅ 自动配置 realmlist
            - ✅ 一键启动游戏
            - ✅ 清理缓存
            - ✅ 检查更新
            - ✅ 在线注册账号
            
            ### 使用方法
            1. 下载 `NolanWoWLauncher.exe`
            2. 运行启动器
            3. 选择 WoW 3.3.5a 客户端目录
            4. 点击"启动游戏"
            
            ### 服务器信息
            - 服务器名称: 诺兰时光魔兽
            - 服务器地址: 1.14.59.54
            - 客户端版本: 3.3.5a (12340)
          files: ./artifact/NolanWoWLauncher.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
