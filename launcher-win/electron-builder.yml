appId: com.nolanwow.launcher
productName: 诺兰时光WoW登录器
copyright: Copyright © 2026 诺兰时光

directories:
  output: dist
  buildResources: build

asar: true

files:
  - package.json
  - dist/**/*
  - "!**/node_modules/*/{README,readme,readme.md,readme.txt,CHANGELOG,changelog,changelog.md,changelog.txt,LICENSE,license,license.md,license.txt,NOTICE,notice,notice.md,notice.txt}"
  - "!**/node_modules/.bin/**"
  - "!**/node_modules/.cache/**"
  - "!**/node_modules/**/test/**"
  - "!**/node_modules/**/tests/**"
  - "!**/node_modules/**/__tests__/**"
  - "!**/node_modules/**/*.ts"
  - "!**/node_modules/**/*.map"
  - "!**/node_modules/**/*.tsbuildinfo"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,erb,scss,sass}"
  - "!**/.*"
  - "!**/.DS_Store"
  - "!**/.git/**"
  - "!**/.github/**"
  - "!**/.idea/**"
  - "!**/.vscode/**"
  - "!**/docs/**"
  - "!**/logs/**"
  - "!**/cache/**"
  - "!**/screenshots/**"
  - "!**/*.test.ts"
  - "!**/*.test.tsx"
  - "!**/*.spec.ts"
  - "!**/*.spec.tsx"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"
  - "!**/src/**"
  - "!**/public/**"
  - "!**/.env*"
  - "!**/tsconfig.json"
  - "!**/tslint.json"
  - "!**/eslint*"
  - "!**/*.log"

extraResources:
  - from: build
    to: build
  - from: public
    to: public
    filter:
      - "!**/screenshots/**"
      - "!**/*.png"
      - "!**/*.jpg"
      - "!**/*.jpeg"
      - "!**/*.gif"
      - "!**/*.svg"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}

publish:
  provider: github
  owner: blqbzf
  repo: openclaw-
