name: build-png-blp-mpq

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'assets/icons-src/**'
      - 'patches/src/**'
      - 'tools/BlpCli/**'
      - 'tools/manifest/**'
      - '.github/workflows/build-png-blp-mpq.yml'
      - '.github/scripts/build-mpq.ps1'
      - 'NolanWoWLauncher/Services/PatchService.cs'

permissions:
  contents: write

jobs:
  build-patch:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build BlpCli
        shell: pwsh
        run: dotnet publish .\tools\BlpCli\BlpCli.csproj -c Release

      - name: Generate BLP from PNG source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\patches\src\wuzitianshu\Interface\Icons | Out-Null
          .\tools\BlpCli\bin\Release\net9.0\publish\BlpCli.exe .\assets\icons-src\INV_Misc_Book_WuZiTianShu.png .\patches\src\wuzitianshu\Interface\Icons\INV_Misc_Book_WuZiTianShu.blp dxt3 1

      - name: Build MPQ
        shell: pwsh
        run: .\.github\scripts\build-mpq.ps1

      - name: Generate manifest + version
        shell: pwsh
        run: python .\tools\manifest\generate_patch_metadata.py

      - name: Upload patch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nolan-patch-pack
          path: |
            patches/dist
            patch-manifests

      - name: Publish patch release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: patches-latest
          name: patches-latest
          prerelease: false
          make_latest: false
          files: |
            patches/dist/*.mpq
            patch-manifests/manifest.json
            patch-manifests/version.json

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mpq-build-debug
          path: |
            tools/mpqcli/build
            tools/mpqcli/extern/StormLib
