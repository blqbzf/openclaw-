name: Build Windows Launcher (Avalonia)

on:
  push:
    branches: [ main, feat/wow-launcher ]
    paths:
      - 'NolanWoWLauncher/**'
      - '.github/workflows/build-windows-launcher-avalonia.yml'
      - '.github/workflows/release-nolan-launcher.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          cd NolanWoWLauncher
          dotnet restore

      - name: Build and Publish (win-x64 self-contained single-file)
        run: |
          cd NolanWoWLauncher
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NolanWoWLauncher-Windows-x64
          path: NolanWoWLauncher/bin/Release/net8.0-windows/win-x64/publish/NolanWoWLauncher.exe
          retention-days: 30
          if-no-files-found: error

      - name: Rename exe
        shell: pwsh
        run: Rename-Item 'NolanWoWLauncher/bin/Release/net8.0-windows/win-x64/publish/NolanWoWLauncher.exe' '诺兰时光登录器v1.3.exe'

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3
          name: "诺兰时光魔兽登录器 V1.3"
          body: |
            ## 诺兰时光魔兽世界登录器 V1.3
            ### 更新
            - 启动游戏前强制删除并重写 realmlist
            - 补丁更新改为版本号比较，强制覆盖旧补丁
            - 补丁从服务器拉取（国内速度快）
            - 修复 API 路径
            - 启动时显示 realmlist 修复状态
          files: |
            NolanWoWLauncher/bin/Release/net8.0-windows/win-x64/publish/诺兰时光登录器v1.3.exe
          overwrite_files: true
