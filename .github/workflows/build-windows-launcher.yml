name: Build Windows Launcher

on:
  push:
    branches: [ main, feat/wow-launcher ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Build launcher-win
        run: |
          cd launcher-win
          npm install
          npm run build:win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NolanWoWLauncher-Windows
          path: launcher-win/dist/*.exe
          retention-days: 30
          if-no-files-found: error
