name: Build WoW Launcher (Windows Only)

on:
  push:
    branches: [main]
    paths:
      - 'wow_launcher.py'
      - 'launcher_config.json'
      - '.github/workflows/build-launcher.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow requests

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name NolanWoWLauncher wow_launcher.py

    - name: Package release files
      run: |
        mkdir release_package
        cp dist/NolanWoWLauncher.exe release_package/
        cp launcher_config.json release_package/
        cp CreateCert.bat release_package/ 2>/dev/null || echo "@echo off\necho Create cert" > release_package/CreateCert.bat
        cp InstallCert.bat release_package/ 2>/dev/null || echo "@echo off\ncertutil -addstore -f Root NolanWoW.cer" > release_package/InstallCert.bat
        cd release_package
        7z a -tzip ../NolanWoWLauncher-Windows.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NolanWoWLauncher-Windows
        path: NolanWoWLauncher-Windows.zip
