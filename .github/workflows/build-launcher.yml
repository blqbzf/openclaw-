name: Build WoW Launcher (Windows Only)

on:
  push:
    branches: [main]
    paths:
      - 'wow_launcher/**'
      - '.github/workflows/build-launcher.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow requests

    - name: Build EXE
      run: |
        cd wow_launcher
        pyinstaller --onefile --windowed --name NolanWoWLauncher wow_launcher.py

    - name: Package release files
      run: |
        mkdir -p release_package
        cp wow_launcher/dist/NolanWoWLauncher.exe release_package/ 2>/dev/null || echo "EXE not found"
        cp wow_launcher/background_nolan.jpg release_package/ 2>/dev/null || echo "Background not found"
        cp wow_launcher/launcher_config.json release_package/ 2>/dev/null || echo "Config not found"
        cp wow_launcher/CreateCert.bat release_package/ 2>/dev/null || echo "CreateCert not found"
        cp wow_launcher/InstallCert.bat release_package/ 2>/dev/null || echo "InstallCert not found"
        cd release_package
        7z a -tzip ../NolanWoWLauncher-Windows.zip * 2>/dev/null || zip -r ../NolanWoWLauncher-Windows.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NolanWoWLauncher-Windows
        path: NolanWoWLauncher-Windows.zip
